# Fly.io config. Frankfurt = lowest latency to central Europe.
app = "claude-hospital"

[env]
GEMINI_MODEL = "gemini-3-flash-preview"

IP_LIMIT = "200"
IP_WINDOW_MINUTES = "60"
DAILY_CAP = "1200"

RETRY_MAX = "3"
RETRY_BASE_MS = "400"
GEMINI_TIMEOUT_MS = "20000"

# OWNER_IPS bypasses per-IP cap; set via `fly secrets set OWNER_IPS=…` if needed.
# OWNER_IPS = ""

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0
processes = ["app"]


[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "256mb"
