# Fly.io config. Frankfurt = lowest latency to central Europe.
app = "claude-hospital"
primary_region = "fra"

[build]
[build.args]
# Public Turnstile site key. Safe to commit — paired secret is a Fly secret.
VITE_TURNSTILE_SITE_KEY = "0x4AAAAAADCite1PYePcMoRY"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0
processes = ["app"]


[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "256mb"
