# Fly.io config. Frankfurt = lowest latency to central Europe.
app = "claude-hospital"
primary_region = "fra"

[build]
[build.args]
# Public Turnstile site key — safe to commit, inlined into the
# client bundle by Vite at build time.
# 1x00000000000000000000AA = Cloudflare's public always-pass TEST key.
# Swap back to the real key (0x4AAAAAADCite1PYePcMoRY) once the
# widget's Hostname Management includes claude-hospital.fly.dev.
VITE_TURNSTILE_SITE_KEY = "1x00000000000000000000AA"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "256mb"
