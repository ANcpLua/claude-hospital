<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0891b2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a1120" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="Six physician-built demos from the Claude Code in Healthcare webinar, rebuilt as interactive stand-ins."
    />
    <title>Claude Code in Healthcare</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@1,8..60,500;1,8..60,600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <script>
      // Bootstrap theme class before React mounts to avoid flash of wrong theme.
      (function () {
        try {
          var t = localStorage.getItem("meduni-theme");
          var dark =
            t === "dark" ||
            (t !== "light" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {
          // ignore
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
