<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <link href="./favicon.svg" rel="icon" type="image/svg+xml"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta content="#0891b2" media="(prefers-color-scheme: light)" name="theme-color"/>
    <meta content="#0a1120" media="(prefers-color-scheme: dark)" name="theme-color"/>
    <meta
            content="Six physician-built demos from the Claude Code in Healthcare webinar, rebuilt as interactive stand-ins."
            name="description"
    />
    <title>Claude Code in Healthcare</title>

    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@1,8..60,500;1,8..60,600&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
    />

    <script>
        // Bootstrap theme class before React mounts to avoid flash of wrong theme.
        (function () {
            try {
                var t = localStorage.getItem("meduni-theme");
                var dark =
                    t === "dark" ||
                    (t !== "light" &&
                        window.matchMedia &&
                        window.matchMedia("(prefers-color-scheme: dark)").matches);
                if (dark) document.documentElement.classList.add("dark");
            } catch (e) {
                // ignore
            }
        })();
    </script>
</head>
<body>
<div id="root"></div>
<script src="/src/main.tsx" type="module"></script>
</body>
</html>
